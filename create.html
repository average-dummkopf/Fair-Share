<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a Team</title>
  <style>
    :root {
      --bg: #dbdbdb;
      --card: rgba(255, 255, 255, 0.9);
      --text: #000;
      --muted: rgba(0, 0, 0, 0.65);
      --button: rgba(0, 0, 0, 0.3);
      --button-hover: rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
      --shadow-light: 0 6px 18px rgba(0, 0, 0, 0.08);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: min(420px, 92vw);
      padding: 2.5rem 2rem;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .card h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .card p {
      margin: 0.6rem 0 1.8rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .field {
      width: 100%;
      margin-bottom: 1rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      background: rgba(255, 255, 255, 0.8);
      font-size: 0.95rem;
      outline: none;
    }

    .field textarea {
      border-radius: 18px;
      resize: vertical;
      min-height: 100px;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.6rem;
    }

    .button {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: var(--button);
      color: #000;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
      box-shadow: var(--shadow-light);
    }

    .button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .button.secondary {
      background: rgba(0, 0, 0, 0.08);
      color: rgba(0, 0, 0, 0.7);
      box-shadow: none;
    }

    .button.secondary:hover {
      background: rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Team Details</h1>
    <p>Enter your team details</p>

    <div class="field">
      <input id="teamName" type="text" placeholder="Team Name" />
    </div>
    <div class="field">
      <input id="teamAmount" type="text" placeholder="Member Amount" />
    </div>
    <div class="field">
      <textarea id="teamDescription" placeholder="Description"></textarea>
    </div>

    <div class="actions">
      <button id="back" class="button secondary">Back</button>
      <button id="next" class="button">Next</button>
    </div>
  </main>

  <script>
    document.getElementById('back').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    document.getElementById('next').addEventListener('click', () => {
      const name = document.getElementById('teamName').value.trim();
      const amount = document.getElementById('teamAmount').value.trim();
      const desc = document.getElementById('teamDescription').value.trim();

      if (!name || !amount) {
        alert('Please fill in the required fields (Team Name and Team Amount).');
        return;
      }

      const params = new URLSearchParams({
        team: name,
        amount,
        desc,
      });

      window.location.href = `main.html?${params.toString()}`;
    });
  </script>
</body>
</html>
