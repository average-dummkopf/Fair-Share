<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat UI Recreation</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: grid;
      grid-template-columns: 65px 240px 1fr 320px;
      grid-template-rows: 60px calc(100vh - 60px);
      background-color: #dcdcdc;
      color: #000;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Scrollbar hiding for cleaner mockup look */
    ::-webkit-scrollbar {
      display: none;
    }

    /* Borders matching mockup lines */
    .br { border-right: 1px solid #777; }
    .bb { border-bottom: 1px solid #777; }

    /* --- Headers --- */
    .header-col {
      display: flex;
      align-items: center;
    }
    .h1 {
      justify-content: center;
      background-color: #dcdcdc;
    }
    .h2 {
      justify-content: center;
      position: relative;
      background-color: #dcdcdc;
    }
    .h2 span {
      font-size: 16px;
    }
    .h2 .add-user-icon {
      position: absolute;
      right: 15px;
      display: flex;
      align-items: center;
    }
    .h3 {
      background-color: #dcdcdc;
    }
    .h4 {
      justify-content: flex-end;
      padding-right: 20px;
      gap: 15px;
      background-color: #dcdcdc;
    }

    /* Top Left Cog */
    .top-cog {
      width: 44px;
      height: 44px;
      background-color: #4a4a4a;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- Column 1: Icons Sidebar --- */
    .icons-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 15px 0;
      overflow-y: auto;
      background-color: #dcdcdc;
    }
    .icon-box {
      width: 42px;
      height: 42px;
      background-color: #555;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 150ms ease, border 150ms ease, transform 150ms ease;
    }

    .icon-box:hover {
      background-color: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    .icon-box.active {
      background-color: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .icon-box svg {
      width: 22px;
      height: 22px;
      fill: white;
    }
    /* Specific styling for stroke-based icons */
    .icon-box .stroke-icon {
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* --- Column 2: Names Sidebar --- */
    .names-col {
      display: flex;
      flex-direction: column;
      background-color: #dcdcdc;
      overflow-y: auto;
    }
    .user-wrench-container {
      display: flex;
      justify-content: center;
      padding: 20px 0 10px 0;
    }
    .user-wrench-container svg {
      width: 46px;
      height: 46px;
    }
    .names-divider-container {
      padding: 0 20px;
      margin-bottom: 15px;
    }
    .names-divider {
      height: 1px;
      background-color: #777;
    }
    .names-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 15px 20px 15px;
    }
    .name-pill {
      background-color: #cccccc;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 150ms ease;
    }

    .name-pill:hover {
      background-color: rgba(0, 0, 0, 0.18);
    }

    .name-pill.active {
      background-color: rgba(0, 0, 0, 0.28);
    }

    /* --- Column 3: Main Chat --- */
    .main-col {
      background-color: #ffffff;
      position: relative;
    }
    .input-container {
      position: absolute;
      bottom: 20px;
      left: 15px;
      right: 15px;
    }
    .input-bar {
      display: flex;
      align-items: center;
      height: 44px;
      border: 2px solid #333;
      border-radius: 12px;
      background-color: #e5e5e5;
      padding: 0 10px;
    }

    .messages {
      position: absolute;
      inset: 20px 15px 90px;
      overflow-y: auto;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 70%;
      border-radius: 16px;
      padding: 10px 14px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
      position: relative;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .message--me {
      align-self: flex-end;
      background: rgba(0, 0, 0, 0.08);
    }

    .message--bot {
      align-self: flex-start;
      background: rgba(0, 0, 0, 0.04);
    }

    .message .meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: rgba(0, 0, 0, 0.55);
      margin-bottom: 6px;
    }

    .message .content {
      white-space: pre-wrap;
    }
    .input-plus {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 10px;
    }
    .input-plus svg {
      width: 20px;
      height: 20px;
    }
    .input-bar input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 15px;
      color: #333;
    }
    .input-bar input::placeholder {
      color: #666;
    }

    /* --- Column 4: Right Panel --- */
    .right-col {
      background-color: #dcdcdc;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .top-pills {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 0;
    }
    .vert-pill {
      width: 36px;
      height: 140px;
      background-color: #c4c4c4;
      border-radius: 18px;
      cursor: pointer;
      transition: background 150ms ease;
    }

    .vert-pill:hover {
      background-color: rgba(0, 0, 0, 0.12);
    }

    .vert-pill.active {
      background-color: rgba(0, 0, 0, 0.18);
    }

    .task-list {
      display: flex;
      flex-direction: column;
    }

    .judge-btn {
      margin: 12px 20px 0;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: #333;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: background 150ms ease;
      z-index: 10;
      position: relative;
      width: calc(100% - 40px);
    }

    .judge-btn:hover {
      background: #111;
    }

    .judge-btn:active {
      transform: scale(0.98);
    }

    .task-card {
      background-color: #ffffff;
      padding: 15px 20px;
      border-top: 1px solid #ddd;
      margin-bottom: -1px; /* collapse borders */
    }
    .task-card:last-child {
      border-bottom: 1px solid #ddd;
    }

    .task-card:hover {
      background-color: rgba(0, 0, 0, 0.05);
    }

    .task-card.active {
      border-left: 3px solid rgba(0, 0, 0, 0.35);
      background-color: rgba(0, 0, 0, 0.08);
    }

    .task-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background-color: #eee;
      border: 1px solid #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 9px;
      font-weight: bold;
      color: #333;
    }
    .user-info {
      font-size: 10px;
    }
    .user-name {
      font-weight: 700;
    }
    .user-role {
      color: #777;
    }
    .task-title {
      font-weight: 800;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }
    .task-desc {
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .task-meta {
      font-size: 9px;
      color: #999;
    }

    /* Utilities */
    .icon-map-bell svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #333;
      stroke-width: 1.5;
    }
    .bell-wrapper {
      position: relative;
      display: flex;
    }
    .red-dot {
      position: absolute;
      top: 1px;
      right: 3px;
      width: 8px;
      height: 8px;
      background-color: #e74c3c;
      border-radius: 50%;
    }

    /* Tab Bar */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #ddd;
      background-color: #fafafa;
    }

    .tab-btn {
      flex: 1;
      height: 100%; /* Ensures the hitbox fills the tab bar height */
      padding: 12px 16px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      transition: all 150ms ease;
      border-bottom: 2px solid transparent;
      display: flex; /* Centers text and expands hit area */
      justify-content: center;
      align-items: center;
    }

    .tab-btn:hover {
      color: #333;
      background-color: rgba(0, 0, 0, 0.02);
    }

    .tab-btn.active {
      color: #000;
      border-bottom-color: #000;
    }

    /* Analysis Panel */
    .analysis-panel {
      position: absolute;
      inset: 60px 15px 90px;
      overflow: hidden;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .analysis-summary {
      flex: 0 0 auto;
      padding: 15px;
      border-bottom: 1px solid #ddd;
      background: white;
    }

    .analysis-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      border-left: 3px solid #333;
    }

    .analysis-header {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .analysis-percentage {
      color: #0066cc;
      font-weight: 700;
    }

    .analysis-description {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .analysis-tasks-label {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      padding: 12px 15px 8px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .analysis-tasks-container {
      flex: 1;
      overflow-y: auto;
      background: #fafafa;
      padding: 10px 15px;
    }

    .analysis-task-item {
      background: white;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 12px;
      border-left: 2px solid #999;
    }

    .analysis-task-title {
      font-weight: 600;
      margin-bottom: 3px;
    }

    .analysis-task-meta {
      font-size: 11px;
      color: #999;
    }
  </style>
</head>

          {

            avatar: 'JK',
            userName: 'Jake K.',
            userRole: 'QA',
            title: 'Test Coverage',
            desc: 'Added unit and integration tests for core features.',
            meta: '3h - Medium',
          },
          {
            owner: 'xavier',
            avatar: 'XV',
            userName: 'Xavier V.',
            userRole: 'Research',
            title: 'User Interviews',
            desc: 'Collected feedback on the current workflow and pain points.',
            meta: '2h - Low',
          },
        ],
      },
      gamma: {
        name: 'Team Gamma',
        members: [
          { id: 'ava', label: 'Ava S.' },
          { id: 'noah', label: 'Noah T.' },
          { id: 'mia', label: 'Mia P.' },
        ],
        tasks: [
          {
            owner: 'ava',
            avatar: 'AV',
            userName: 'Ava S.',
            userRole: 'UI',
            title: 'Prototype Screens',
            desc: 'Created clickable Figma prototypes for the new feature flow.',
            meta: '4h - Medium',
          },
          {
            owner: 'noah',
            avatar: 'NO',
            userName: 'Noah T.',
            userRole: 'Backend',
            title: 'Database Migration',
            desc: 'Planned schema migration and data transformation scripts.',
            meta: '6h - High',
          },
          {
            owner: 'mia',
            avatar: 'MI',
            userName: 'Mia P.',
            userRole: 'PM',
            title: 'Roadmap Planning',
            desc: 'Outlined milestones and timelines for the next quarter.',
            meta: '3h - Medium',
          },
        ],
      },
      delta: {
        name: 'Team Delta',
        members: [
          { id: 'zara', label: 'Zara R.' },
          { id: 'eli', label: 'Eli L.' },
          { id: 'nina', label: 'Nina M.' },
        ],
        tasks: [
          {
            owner: 'zara',
            avatar: 'ZR',
            userName: 'Zara R.',
            userRole: 'Design',
            title: 'Icon Library',
            desc: 'Built a cohesive icon library and component set.',
            meta: '4h - Medium',
          },
          {
            owner: 'eli',
            avatar: 'EL',
            userName: 'Eli L.',
            userRole: 'DevOps',
            title: 'Deployment Pipeline',
            desc: 'Configured CI/CD for automated builds and deployments.',
            meta: '5h - High',
          },
          {
            owner: 'nina',
            avatar: 'NM',
            userName: 'Nina M.',
            userRole: 'Support',
            title: 'Bug Triage',
            desc: 'Categorized and prioritized customer issues in the tracker.',
            meta: '2h - Low',
          },
        ],
      },
    };

    const clearActive = (elements) => elements.forEach((el) => el.classList.remove('active'));

    const renderNames = (teamKey, members) => {
      namesList.innerHTML = '';

      const createPill = (id, label, isGlobal = false) => {
        const pill = document.createElement('div');
        pill.className = 'name-pill';
        if (isGlobal) pill.classList.add('active');
        pill.dataset.memberId = id;
        pill.textContent = label;

        pill.addEventListener('click', () => {
          clearActive(Array.from(document.querySelectorAll('.name-pill')));
          clearActive(Array.from(document.querySelectorAll('.task-card')));
          clearActive(vertPills);

          pill.classList.add('active');
          teamSubtitle.textContent = label;

          // Update Chat
          setChatKey(isGlobal ? `${teamKey}_global` : `${teamKey}_${id}`);

          // Update Right Panel Tasks
          const team = teams[teamKey];
          renderTasks(team.tasks, id);

          // Update Analysis Panel
          renderAnalysis(teamKey, id);
        });

        return pill;
      };

      // Add Global Chat
      namesList.appendChild(createPill('', 'Global Chat', true));

      // Add Member Pills
      members.forEach((member) => {
        namesList.appendChild(createPill(member.id, member.label));
      });
    };

    const renderTasks = (tasks, memberId = null) => {
      taskList.innerHTML = '';
      const filtered = memberId
        ? tasks.filter((task) => task.owner === memberId)
        : [];

      if (memberId && filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'task-card';
        empty.style.textAlign = 'center';
        empty.style.color = 'rgba(0,0,0,0.55)';
        empty.textContent = 'No tasks assigned yet.';
        taskList.appendChild(empty);
        return;
      }

      filtered.forEach((task) => {
        const card = document.createElement('div');
        card.className = 'task-card';

        const header = document.createElement('div');
        header.className = 'task-header';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = task.avatar;

        const info = document.createElement('div');
        info.className = 'user-info';
        info.innerHTML = `<span class="user-name">${task.userName}</span><br><span class="user-role">${task.userRole}</span>`;

        header.appendChild(avatar);
        header.appendChild(info);
        card.appendChild(header);

        
      const title = document.createElement('div');
        title.className = 'task-title';
        title.textContent = task.title;

        const desc = document.createElement('div');
        desc.className = 'task-desc';
        desc.textContent = task.desc;

        const meta = document.createElement('div');
        meta.className = 'task-meta';
        meta.textContent = task.meta;

        card.appendChild(title);
        card.appendChild(desc);
        card.appendChild(meta);

        card.addEventListener('click', () => {
          clearActive(Array.from(document.querySelectorAll('.task-card')));
          clearActive(Array.from(document.querySelectorAll('.name-pill')));
          clearActive(vertPills);
          card.classList.add('active');
          teamSubtitle.textContent = task.title;
        });

        taskList.appendChild(card);
      });
    };

    const selectTeam = (teamKey) => {
      const team = teams[teamKey];
      if (!team) return;

      clearActive(icons);
      clearActive(Array.from(document.querySelectorAll('.name-pill')));
      clearActive(Array.from(document.querySelectorAll('.task-card')));
      clearActive(vertPills);

      const icon = icons.find((el) => el.dataset.team === teamKey);
      if (icon) icon.classList.add('active');

      teamTitle.textContent = team.name;
      teamSubtitle.textContent = 'Select a member or task';
      renderNames(teamKey, team.members);

      // Default to first member (shows tasks immediately)
      const namePills = namesList.querySelectorAll('.name-pill');
      if (namePills.length > 1) {
        // Index 0 is Global Chat; index 1 is first real member.
        namePills[1].click();
      } else if (namePills.length > 0) {
        namePills[0].click();
      }
    };

    icons.forEach((icon) => {
      icon.addEventListener('click', () => {
        selectTeam(icon.dataset.team);
      });
    });

    vertPills.forEach((pill, idx) => {
      pill.addEventListener('click', () => {
        clearActive(vertPills);
        clearActive(Array.from(document.querySelectorAll('.name-pill')));
        clearActive(Array.from(document.querySelectorAll('.task-card')));
        pill.classList.add('active');
        teamSubtitle.textContent = `Quick view ${idx + 1}`;
      });
    });

    // Tab switching logic
    const tabBtns = Array.from(document.querySelectorAll('.tab-btn'));
    const messagesPanel = document.getElementById('messages');
    const analysisPanel = document.getElementById('analysis');

    const params = new URLSearchParams(window.location.search);
    const requestedTeam = params.get('team')?.toLowerCase();
    selectTeam(Object.keys(teams).includes(requestedTeam) ? requestedTeam : 'alpha');

    // Dummy analysis data generator
    const dummyAnalysisData = {
      gaia: { percent: '80%', strengths: 'Frontend architecture, UI component design, responsive layouts' },
      ahmed: { percent: '75%', strengths: 'API development, database optimization, backend scalability' },
      lisa: { percent: '85%', strengths: 'Design systems, visual consistency, user experience' },
      pratt: { percent: '78%', strengths: 'Full-stack development, real-time features, system integration' },
      jake: { percent: '70%', strengths: 'Quality assurance, testing strategy, bug prevention' },
      xavier: { percent: '65%', strengths: 'User research, market analysis, product insights' },
      ava: { percent: '82%', strengths: 'UI prototyping, interaction design, animation' },
      noah: { percent: '76%', strengths: 'Database design, migrations, backend services' },
      mia: { percent: '72%', strengths: 'Project planning, roadmap definition, stakeholder communication' },
      zara: { percent: '88%', strengths: 'Design systems, iconography, brand consistency' },
      eli: { percent: '80%', strengths: 'DevOps, CI/CD pipelines, deployment automation' },
      nina: { percent: '68%', strengths: 'Issue triage, customer support, documentation' },
    };

    function renderAnalysis(teamKey, memberId = null) {
      if (!analysisPanel) return;
      analysisPanel.innerHTML = '';
      const team = teams[teamKey];
      if (!team) return;

      // 1. Main Summary Section (Top)
      const summaryDiv = document.createElement('div');
      summaryDiv.className = 'analysis-summary';

      if (memberId) {
        const member = team.members.find((m) => m.id === memberId);
        const analysis = dummyAnalysisData[memberId];
        if (member && analysis) {
          summaryDiv.innerHTML = `
            <div class="analysis-item">
              <div class="analysis-header">${member.label} - <span class="analysis-percentage">${analysis.percent}</span> of work done</div>
              <div class="analysis-description">${member.label} has done ${analysis.percent} of the work, excelling at: ${analysis.strengths}.</div>
            </div>`;
        }
      } else {
        summaryDiv.innerHTML = `<div class="analysis-item"><div class="analysis-header">Team Overview</div><div class="analysis-description">Select a member to see detailed contribution analysis.</div></div>`;
      }

      analysisPanel.appendChild(summaryDiv);

      // 2. Tasks Section (Bottom)
      if (memberId) {
        const tasksLabel = document.createElement('div');
        tasksLabel.className = 'analysis-tasks-label';
        tasksLabel.textContent = 'Tasks Completed:';
        analysisPanel.appendChild(tasksLabel);

        const tasksDiv = document.createElement('div');
        tasksDiv.className = 'analysis-tasks-container';

        const memberTasks = team.tasks.filter((t) => t.owner === memberId);
        if (memberTasks.length === 0) {
          tasksDiv.innerHTML = `<div class="analysis-task-item">No tasks assigned yet.</div>`;
        } else {
          memberTasks.forEach((task) => {
            const taskItem = document.createElement('div');
            taskItem.className = 'analysis-task-item';
            taskItem.innerHTML = `
              <div class="analysis-task-title">${task.title}</div>
              <div class="analysis-task-meta">${task.meta}</div>`;
            tasksDiv.appendChild(taskItem);
          });
        }

        analysisPanel.appendChild(tasksDiv);
      }
    }

    tabBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;

        // Remove active from all tabs
        tabBtns.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');

        // Show/hide panels
        if (tabName === 'chat') {
          messagesPanel.style.display = 'flex';
          analysisPanel.style.display = 'none';
        } else if (tabName === 'analysis') {
          messagesPanel.style.display = 'none';
          analysisPanel.style.display = 'block';
        }
      });
    });
  </script>
</body>
